services:

  # --- Bases de datos ---
  auth-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: sitad
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - sitad-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  vehicular-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: vehicular_db
      MYSQL_USER: sitad
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    networks:
      - sitad-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  fiscalizacion-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fiscalizacion_db
      MYSQL_USER: sitad
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3309:3306"
    networks:
      - sitad-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # --- Service Discovery ---
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - sitad-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # --- API Gateway ---
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    networks:
      - sitad-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # --- Microservicios ---
  auth:
    build: ./auth
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - sitad-network
    depends_on:
      auth-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  vehicular:
    build: ./vehicular
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8082:8082"
    networks:
      - sitad-network
    depends_on:
      vehicular-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  fiscalizacion:
    build: ./fiscalizacion
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8083:8083"
    networks:
      - sitad-network
    depends_on:
      fiscalizacion-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  servicio-externo:
    build: ./servicio-externo
    ports:
      - "8084:8084"
    networks:
      - sitad-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # --- Frontend ---
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - sitad-network
    depends_on:
      gateway:
        condition: service_healthy

networks:
  sitad-network:
    driver: bridge
