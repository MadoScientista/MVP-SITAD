spring:
  application:
    name: auth
  datasource:
    url: jdbc:mysql://auth-db:3306/auth_db
    username: sitad
    password: DB_PASSWORD_REEMPLAZADO
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka

jwt:
  secret: "JWT_SECRET_REEMPLAZADO"
  access-token-expiration: 1800000
