spring:
  application:
    name: fiscalizacion
  datasource:
    url: jdbc:mysql://fiscalizacion-db:3306/fiscalizacion_db
    username: sitad
    password: DB_PASSWORD_REEMPLAZADO
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka

jwt:
  secret: "JWT_SECRET_REEMPLAZADO"
