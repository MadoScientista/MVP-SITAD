spring:
  application:
    name: gateway
  cloud:
    loadbalancer:
      cache:
        enabled: false
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5173"
                allowed-methods:
                  - GET
                  - POST
                  - PATCH
                  - DELETE
                allowed-headers:
                  - Authorization
                  - Content-Type
          routes:
            - id: auth-service
              uri: lb://auth
              predicates:
                - Path=/api/v1/auth/**
            - id: vehicular-service
              uri: lb://vehicular
              predicates:
                - Path=/api/v1/vehicular/**
            - id: fiscalizacion-service
              uri: lb://fiscalizacion
              predicates:
                - Path=/api/v1/fiscalizacion/**
            - id: externo-service
              uri: lb://servicio-externo
              predicates:
                - Path=/api/v1/externo/**

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
